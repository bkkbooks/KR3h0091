body:
  text: 草書狀一卷聖皇御世隨時之宜倉頡既生書契是為科斗鳥篆類物象形睿哲變通意巧茲生損之隸草以崇簡易百官畢修事業並麗蓋草書之為狀也婉若銀鉤漂若驚鸞舒翼未發若舉復安蟲蛇虬蟉或往或還類阿那以嬴形欻奮釁而桓桓及其逸遊盻響乍正乍邪騏驥暴怒逼其轡海水窊隆揚其波芝草蒲陶還相繼棠棣融融載其華玄熊對距于山嶽飛燕相追而差池舉而察之又似乎和風吹林偃草扇樹枝條順氣轉相比附窈嬈廉苫隨體散布紛擾擾以猗靡中持疑而猶豫玄螭狡獸嬉其間騰猿飛鼺相奔趣淩魚奮尾蛟龍反據投空自竄張設牙距或若登高望其類或若既往而中顧或若俶儻而不群或若自檢於常度於是多才之英篤藝之彥役心精微耽此文憲守道兼權觸類生變離析八體靡形不判去繁存微大象未亂上理開元下周謹案騁辭放手雨行冰散高音翰厲溢越流漫忽班班而成章信奇妙之煥爛體磊落而壯麗姿光潤以粲粲粲命杜度運其指使伯英回其腕著絶勢於紈素垂百世之殊觀晉書索靖傳太平御覽卷七百四十七歐陽詢藝文類聚引蓋草書之為狀也至張設牙距無芝草二句
